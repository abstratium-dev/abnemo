<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Abnemo - Network Monitor{% endblock %}</title>
    <link rel="stylesheet" href="/styles.css">
    {% block extra_head %}{% endblock %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }
        
        .app-container {
            max-width: 100%;
            margin: 0;
        }
        
        header {
            background: var(--color-bg-primary);
            border-bottom: 1px solid var(--color-border-primary);
            padding: 0;
            margin-bottom: 0;
            box-shadow: 0 2px 4px var(--shadow-sm);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            gap: 20px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            height: 32px;
            width: auto;
        }
        
        .brand-name {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--color-text-primary);
            letter-spacing: 0.5px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.95em;
        }
        
        .header-right a {
            color: var(--color-link-primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .header-right a:hover:not(.inactive-link) {
            color: var(--color-link-hover);
            text-decoration: underline;
        }
        
        .header-right a.inactive-link {
            color: var(--color-text-tertiary);
            cursor: default;
            pointer-events: none;
        }
        
        .theme-toggle-btn {
            background: transparent;
            border: 1px solid var(--color-border-secondary);
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s ease;
            color: var(--color-text-primary);
        }
        
        .theme-toggle-btn:hover {
            background: var(--color-bg-secondary);
            border-color: var(--color-primary);
            transform: none;
            box-shadow: none;
        }
        
        .theme-toggle-btn:active {
            transform: scale(0.95);
        }
        
        .main-content {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .auth-card {
            display: none;
            background: var(--color-bg-primary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px var(--shadow-sm);
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border: 1px solid var(--color-border-primary);
        }

        .auth-card.active {
            display: flex;
        }

        .auth-card strong {
            color: var(--color-text-primary);
        }

        .auth-actions {
            display: flex;
            gap: 10px;
        }

        .auth-details {
            color: var(--color-text-secondary);
            font-size: 0.95em;
            margin-top: 6px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-right {
                width: 100%;
                justify-content: flex-start;
            }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header">
                <div class="header-left">
                    <span class="brand-name">{% block brand_name %}ABNEMO{% endblock %}</span>
                </div>
                <div class="header-right">
                    <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode" aria-label="Toggle theme">
                        <span id="theme-icon">🌙</span>
                    </button>
                    <span>&nbsp;|&nbsp;</span>
                    <a href="/" id="network-link">🌐 network</a>
                    <span>&nbsp;|&nbsp;</span>
                    <a href="/iptables" id="iptables-link">🔥 iptables</a>
                    <span>&nbsp;|&nbsp;</span>
                    <a href="/fail2ban" id="fail2ban-link">🛡️ fail2ban</a>
                    <span id="auth-separator" style="display: none;">&nbsp;|&nbsp;</span>
                    <a href="#" id="auth-link" style="display: none;" onclick="handleAuthClick(event)"></a>
                </div>
            </div>
        </header>

        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        // ===== THEME MANAGEMENT =====
        function initTheme() {
            const savedTheme = localStorage.getItem('abnemo-theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
            applyTheme(theme);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('abnemo-theme', theme);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const theme = document.documentElement.getAttribute('data-theme') || 'light';
            const icon = document.getElementById('theme-icon');
            const button = document.getElementById('theme-toggle');
            if (icon) {
                icon.textContent = theme === 'light' ? '🌙' : '☀️';
            }
            if (button) {
                const action = theme === 'light' ? 'dark' : 'light';
                button.setAttribute('title', `Switch to ${action} mode`);
                button.setAttribute('aria-label', `Switch to ${action} mode`);
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        }

        // ===== NAVIGATION ACTIVE STATE =====
        function updateActiveNavLink() {
            const path = window.location.pathname;
            const links = {
                '/': 'network-link',
                '/iptables': 'iptables-link',
                '/fail2ban': 'fail2ban-link'
            };
            
            // Remove inactive-link from all
            Object.values(links).forEach(id => {
                const link = document.getElementById(id);
                if (link) link.classList.remove('inactive-link');
            });
            
            // Add inactive-link to current page
            const currentLinkId = links[path];
            if (currentLinkId) {
                const currentLink = document.getElementById(currentLinkId);
                if (currentLink) currentLink.classList.add('inactive-link');
            }
        }

        // ===== AUTHENTICATION =====
        let authState = { oauth_enabled: false, authenticated: true, user: null, required_group: null, required_groups: null, has_access: true };

        function updateAppVisibility() {
            const appContent = document.getElementById('app-content');
            if (!appContent) return;
            if (!authState.oauth_enabled) {
                appContent.style.display = '';
                return;
            }
            const visible = authState.authenticated && authState.has_access;
            appContent.style.display = visible ? '' : 'none';
            if (!visible) {
                const errorContainer = document.getElementById('error-container');
                if (errorContainer) {
                    errorContainer.innerHTML = '';
                }
            }
        }

        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            if (errorContainer) {
                errorContainer.innerHTML = `<div class="error">${message}</div>`;
            }
        }
        
        function clearError() {
            const errorContainer = document.getElementById('error-container');
            if (errorContainer) {
                errorContainer.innerHTML = '';
            }
        }

        async function fetchAuthStatus() {
            try {
                const response = await fetch('/api/user');
                if (response.status === 401) {
                    const data = await response.json().catch(() => ({}));
                    authState = {
                        oauth_enabled: data.oauth_enabled ?? true,
                        authenticated: false,
                        user: null,
                        required_group: data.required_group ?? null,
                        required_groups: data.required_groups ?? null,
                        has_access: false
                    };
                } else if (response.ok) {
                    const data = await response.json();
                    authState = {
                        oauth_enabled: data.oauth_enabled ?? false,
                        authenticated: data.authenticated ?? true,
                        user: data.user || null,
                        required_group: data.required_group ?? null,
                        required_groups: data.required_groups ?? null,
                        has_access: data.has_access ?? true
                    };
                } else if (response.status === 403) {
                    const data = await response.json().catch(() => ({}));
                    authState = {
                        oauth_enabled: data.oauth_enabled ?? true,
                        authenticated: data.authenticated ?? true,
                        user: data.user || null,
                        required_group: data.required_group ?? null,
                        required_groups: data.required_groups ?? null,
                        has_access: false
                    };
                } else {
                    authState = { oauth_enabled: false, authenticated: true, user: null, required_group: null, required_groups: null, has_access: true };
                }
            } catch (error) {
                console.warn('Failed to fetch auth state', error);
                authState = { oauth_enabled: false, authenticated: true, user: null, required_group: null, required_groups: null, has_access: true };
            }
            updateAuthCard();
            updateAppVisibility();
            return authState;
        }

        function updateAuthCard() {
            const authLink = document.getElementById('auth-link');
            const authSeparator = document.getElementById('auth-separator');

            if (!authState.oauth_enabled) {
                if (authLink) authLink.style.display = 'none';
                if (authSeparator) authSeparator.style.display = 'none';
                return;
            }

            if (authLink && authSeparator) {
                authSeparator.style.display = '';
                authLink.style.display = '';
                
                if (authState.authenticated && authState.has_access) {
                    const displayName = (authState.user && (authState.user.name || authState.user.email || authState.user.sub)) || 'User';
                    authLink.textContent = `Sign out (${displayName})`;
                    authLink.title = 'Sign out';
                } else if (authState.authenticated && !authState.has_access) {
                    const displayName = (authState.user && (authState.user.name || authState.user.email || authState.user.sub)) || 'User';
                    authLink.textContent = `⚠️ ${displayName} (no access)`;
                    authLink.title = 'Insufficient permissions';
                } else {
                    authLink.textContent = 'Sign in';
                    authLink.title = 'Sign in to access monitoring data';
                }
            }
            updateAppVisibility();
        }

        function handleAuthClick(event) {
            event.preventDefault();
            if (authState.authenticated) {
                logout();
            } else {
                startLogin();
            }
        }

        function startLogin() {
            window.location.href = '/oauth/login';
        }

        async function logout() {
            if (!authState.oauth_enabled) {
                return;
            }
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (error) {
                console.warn('Logout failed', error);
            }
            await fetchAuthStatus();
            showError('You have been signed out. Please sign in again to load data.');
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            updateActiveNavLink();
            await fetchAuthStatus();
        });

        {% block extra_scripts %}{% endblock %}
    </script>
</body>
</html>
